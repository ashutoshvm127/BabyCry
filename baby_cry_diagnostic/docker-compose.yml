# ==============================================================================
# Baby Cry Diagnostic System - Docker Compose Configuration
# ==============================================================================
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==============================================================================

version: '3.8'

services:
  # ===========================================================================
  # Backend API Service (FastAPI + AI Ensemble)
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: baby-cry-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - USE_GPU=${USE_GPU:-false}
      - MODEL_CACHE_DIR=/app/model_cache
      - KAGGLE_USERNAME=${KAGGLE_USERNAME}
      - KAGGLE_KEY=${KAGGLE_KEY}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
    volumes:
      # Model cache persistence
      - model_cache:/app/model_cache
      # Reports output
      - reports:/app/reports
      # Logs
      - logs:/app/logs
      # Development: mount source for hot reload
      # - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - baby-cry-network
    
  # ===========================================================================
  # Frontend Dashboard (React.js + Nginx)
  # ===========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: baby-cry-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - baby-cry-network

  # ===========================================================================
  # Redis Cache (Optional - for session/result caching)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: baby-cry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - baby-cry-network

# ==============================================================================
# Networks
# ==============================================================================
networks:
  baby-cry-network:
    driver: bridge

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  model_cache:
    driver: local
  reports:
    driver: local
  logs:
    driver: local
  redis_data:
    driver: local
